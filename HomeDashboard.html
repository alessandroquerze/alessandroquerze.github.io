<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HomeDashboard (no Google API)</title>

  <!-- Leaflet (no Google API) -->
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>


  <style>
    body {
      margin: 0;
      background: #18181b;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    .top-right-buttons {
      position: fixed;
      top: 32px;
      right: 40px;
      display: flex;
      gap: 16px;
      z-index: 1000;
    }

    .top-right-buttons button {
      background: #23232a;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 22px;
      font-size: 1.03rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 3px 12px #0003;
      transition: background 0.15s;
    }
    .top-right-buttons button:hover {
      background: #6366f1;
    }

    .center-frame-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* “frame” come nel FINALE */
    #map {
      width: 1300px;
      height: 700px;
      border-radius: 16px;
      box-shadow: 0 4px 24px #0006;
      background: #2d2d37;
      overflow: hidden;
    }

    /* pallino user pulsante */
    .user-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #144cff;
      border: 3px solid #ffffff;
      box-shadow: 0 0 0 0 rgba(20, 76, 255, 0.6);
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(20, 76, 255, 0.55); }
      70%  { box-shadow: 0 0 0 14px rgba(20, 76, 255, 0.0); }
      100% { box-shadow: 0 0 0 0 rgba(20, 76, 255, 0.0); }
    }
  </style>
</head>

<body>
  <div class="top-right-buttons">
    <a href="storico.html"><button>apri storico</button></a>
    <a href="registrazione.html"><button>registrati</button></a>
    <a href="login.html"><button>accedi</button></a>
  </div>

  <div class="center-frame-container">
    <div id="map"></div>
  </div>

  <script>
    // --- Config ---
    const DEFAULT_CENTER = { lat: 44.49554944757558, lng: 11.342902418112871 };
    const DEFAULT_ZOOM = 13;
    let radii = 0.03; // come nel FINALE
    let userCenter = { ...DEFAULT_CENTER };

    function valueToColor(val) {
      if (val > 66) return "red";
      if (val > 33) return "yellow";
      return "green";
    }

    // --- Init Leaflet map ---
   const map = new maplibregl.Map({
  container: 'map',
  style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
  center: [11.3429,44.4955],
  zoom: 13
});

map.on('load', () => {

  /* fiumi azzurri */

  map.setPaintProperty(
    'water',
    'fill-color',
    '#0015ff'
  );

});

    // Tile scure (CartoDB Dark Matter)
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
      subdomains: "abcd",
      maxZoom: 20
    }).addTo(map);

    // Layer gruppi marker sensori
    const sensorLayer = L.layerGroup().addTo(map);



    function clearMarkers() {
      sensorLayer.clearLayers();
    }

    async function fetchAndUpdateSensors(center, radii) {
      const url = `https://35.228.106.14:8443/sensors?lat=${center.lat}&lng=${center.lng}&radii=${radii}`;
      try {
        const res = await fetch(url);
        const text = await res.text();

        const lines = text.trim().split("\n").filter(Boolean);
        clearMarkers();

        for (const line of lines) {
          // id#lat#lng#value
          const parts = line.split("#");
          if (parts.length !== 4) continue;

          const id = parts[0];
          const lat = parseFloat(parts[1]);
          const lng = parseFloat(parts[2]);
          const value = parseFloat(parts[3]);
          const color = valueToColor(value);

          const marker = L.circleMarker([lat, lng], {
            radius: 7,
            color: "lightblue",
            weight: 2,
            fillColor: color,
            fillOpacity: 1
          }).bindTooltip(`${id} (${value})`, { sticky: true });

          sensorLayer.addLayer(marker);
        }
      } catch (err) {
        console.error("Error fetching sensors:", err);
        clearMarkers();
      }
    }

    // prima fetch + refresh periodico (20s come nel FINALE)
    fetchAndUpdateSensors(userCenter, radii);
    setInterval(() => fetchAndUpdateSensors(userCenter, radii), 20000);

    // --- User location (dot pulsante + cerchio accuratezza) ---
    const userIcon = L.divIcon({
      className: "",
      html: `<div class="user-dot"></div>`,
      iconSize: [16, 16],
      iconAnchor: [8, 8]
    });

    let userMarker = L.marker([DEFAULT_CENTER.lat, DEFAULT_CENTER.lng], { icon: userIcon });
    let accuracyCircle = L.circle([DEFAULT_CENTER.lat, DEFAULT_CENTER.lng], {
      radius: 0,
      color: "#033dfc",
      weight: 1,
      opacity: 0.2,
      fillColor: "#033dfc",
      fillOpacity: 0.1
    });

    function enableGeolocation() {
      if (!navigator.geolocation) {
        console.error("Geolocation is not supported by this browser.");
        return;
      }

      userMarker.addTo(map);
      accuracyCircle.addTo(map);

      navigator.geolocation.watchPosition(
        (position) => {
          const userPos = {
            lat: position.coords.latitude,
            lng: position.coords.longitude
          };

          userMarker.setLatLng([userPos.lat, userPos.lng]);
          accuracyCircle.setLatLng([userPos.lat, userPos.lng]);
          accuracyCircle.setRadius(position.coords.accuracy);

          map.setView([userPos.lat, userPos.lng], map.getZoom(), { animate: true });
          userCenter = userPos;

          // refresh immediato come nel FINALE
          fetchAndUpdateSensors(userCenter, radii);
        },
        (error) => {
          console.error("Error getting position:", error);
        },
        {
          enableHighAccuracy: true,
          maximumAge: 0,
          timeout: 10000
        }
      );
    }

    enableGeolocation();
  </script>
</body>
</html>
